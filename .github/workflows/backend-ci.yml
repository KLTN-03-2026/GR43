name: Backend CI/CD

on:
  push:
    branches:
      - main
      - cicd
    paths:
      - "backend/**"
      - "k8s/**"
      - ".github/workflows/**"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0

      - name: Restore
        run: dotnet restore backend

      - name: Build
        run: dotnet build backend --configuration Release

      - name: Publish
        run: dotnet publish backend -c Release -o publish

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/datn2026-stt43-backend:latest

  deploy:
    runs-on: self-hosted
    needs: build-and-push
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        run: |
          # Kiểm tra kubectl có tồn tại không
          if ! command -v kubectl &> /dev/null
          then
              echo "Error: kubectl not found on self-hosted runner. Please install it."
              exit 1
          fi

      - name: Deploy to Kubernetes
        env:
          MONGODB_CONNECTION_STRING: ${{ secrets.MONGODB_CONNECTION_STRING }}
          REDIS_CONNECTION_STRING: ${{ secrets.REDIS_CONNECTION_STRING }}
        run: |
          # Inject secrets into manifests
          envsubst < k8s/secret.yml > k8s/secret_ready.yml

          # Apply all manifests
          kubectl apply -f k8s/redis.yml
          kubectl apply -f k8s/configmap.yml
          kubectl apply -f k8s/secret_ready.yml
          kubectl apply -f k8s/service.yml
          kubectl apply -f k8s/deployments.yml

          # Rollout restart để pull image mới nhất từ GHCR
          kubectl rollout restart deployment/datn2026-stt43-backend
