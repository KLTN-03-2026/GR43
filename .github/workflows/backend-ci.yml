name: Backend CI/CD

on:
  push:
    branches:
      - main
      - cicd
      - noti
      - develop
    paths:
      - "backend/**"
      - "k8s/**"
      - ".github/workflows/backend-ci.yml"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0

      - name: Restore
        run: dotnet restore backend

      - name: Build
        run: dotnet build backend --configuration Release --no-restore

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/datn2026-stt43-backend:latest

  deploy:
    runs-on: self-hosted
    needs: build-and-push
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check kubectl
        run: |
          if ! command -v kubectl &> /dev/null; then
            echo "Error: kubectl not found on self-hosted runner."
            exit 1
          fi

      - name: Deploy to Kubernetes
        env:
          # Database
          MONGODB_CONNECTION_STRING: ${{ secrets.MONGODB_CONNECTION_STRING }}
          REDIS_CONNECTION_STRING: ${{ secrets.REDIS_CONNECTION_STRING }}
          # Google OAuth2
          OAUTH2_GOOGLE_CLIENT_ID: ${{ secrets.OAUTH2_GOOGLE_CLIENT_ID }}
          OAUTH2_GOOGLE_CLIENT_SECRET: ${{ secrets.OAUTH2_GOOGLE_CLIENT_SECRET }}
          # SMTP Email
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          # RabbitMQ
          RABBITMQ_USERNAME: ${{ secrets.RABBITMQ_USERNAME }}
          RABBITMQ_PASSWORD: ${{ secrets.RABBITMQ_PASSWORD }}
          # JWT
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
        run: |
          # Đảm bảo namespace tồn tại
          kubectl create namespace datn2026-stt43 --dry-run=client -o yaml | kubectl apply -f -

          # Inject secrets từ GitHub Secrets vào manifest
          envsubst < k8s/secret.yml > k8s/secret_ready.yml

          # Apply tất cả manifests theo thứ tự
          kubectl apply -f k8s/redis.yml
          kubectl apply -f k8s/configmap.yml
          kubectl apply -f k8s/secret_ready.yml
          kubectl apply -f k8s/service.yml
          kubectl apply -f k8s/deployments.yml

          # Xóa file tạm chứa secrets
          rm -f k8s/secret_ready.yml

          # Rollout restart để pull image mới nhất
          kubectl rollout restart deployment/datn2026-stt43-backend -n datn2026-stt43
          kubectl rollout status deployment/datn2026-stt43-backend -n datn2026-stt43 --timeout=120s
