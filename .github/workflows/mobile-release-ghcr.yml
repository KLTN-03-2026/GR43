name: Mobile App Release (Build APK & Push to GHCR)

on:
  push:
    branches:
      - main
      - cicd
      - mobile
    paths:
      - "frontend/mobile-react-native/**"
      - ".github/workflows/mobile-release-ghcr.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push-image:
    name: Build APK and Push Image to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Lowercase Image Name
        id: image_name
        run: |
          IMAGE="${{ github.repository_owner }}/psyconnect-mobile-apk"
          echo "IMAGE_LOWER=$(echo $IMAGE | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_LOWER }}
          tags: |
            type=sha,format=short
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend/mobile-react-native
          file: ./frontend/mobile-react-native/Dockerfile.android
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_LOWER }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_LOWER }}:buildcache,mode=max

      - name: Extract APK File from Image
        run: |
          echo "Tạo một container tạm thời từ image vừa build..."
          docker create --name apk-extractor ${{ env.REGISTRY }}/${{ env.IMAGE_LOWER }}:latest

          echo "Copy APK từ container ra ngoài runner..."
          docker cp apk-extractor:/app/android/app/build/outputs/apk/release/app-release.apk ./app-release.apk

          echo "Xóa container tạm..."
          docker rm apk-extractor

      - name: Upload APK as Workflow Artifact
        uses: actions/upload-artifact@v4
        with:
          name: psyconnect-mobile-release-apk
          path: ./app-release.apk
          retention-days: 7
