apiVersion: apps/v1
kind: Deployment
metadata:
  name: doantotnghiep-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/hiamchubbybear/doantotnghiep-backend:latest
          ports:
            - containerPort: 5050
